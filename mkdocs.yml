site_name: Documentos oficiales de la Escuela de Sistemas
site_description: Documento oficial de evaluación del perfil de egreso y guías complementarias en construcción para proyectos progresivos de Ingeniería de Sistemas.
docs_dir: docs
exclude_docs: |
  lineas/**

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Evaluación del perfil de egreso: transcripcion.md
  - Anexos:
      - Estándares transversales:
          - Topics para repositorios académicos: anexos/estandar-topics-repositorios.md
