site_name: Documentos oficiales de la Escuela de Sistemas
site_description: Documento oficial de evaluación del perfil de egreso y guías complementarias en construcción para proyectos progresivos de Ingeniería de Sistemas.
docs_dir: docs

theme:
  name: material
  language: es
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - scheme: default
      primary: indigo
      accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

extra_css:
  - stylesheets/extra.css

nav:
  - Inicio: index.md
  - Evaluación del perfil de egreso: transcripcion.md
  - Guías complementarias en construcción:
      - Gestión TI:
          - Guía preliminar de la línea: lineas/gestion/index.md
          - Evidencias progresivas en construcción: lineas/gestion/evidencias.md
          - Orientación preliminar para la EPE: lineas/gestion/evaluacion-perfil-egreso.md
      - Ingeniería de Software:
          - Guía preliminar de la línea: lineas/software/index.md
          - Evidencias progresivas en construcción: lineas/software/evidencias.md
          - Orientación preliminar para la EPE: lineas/software/evaluacion-perfil-egreso.md
      - Infraestructura:
          - Guía preliminar de la línea: lineas/infraestructura/index.md
          - Evidencias progresivas en construcción: lineas/infraestructura/evidencias.md
          - Orientación preliminar para la EPE: lineas/infraestructura/evaluacion-perfil-egreso.md
      - Ciencia de Datos e IA:
          - Guía preliminar de la línea: lineas/cd-ia/index.md
          - Evidencias progresivas en construcción: lineas/cd-ia/evidencias.md
          - Orientación preliminar para la EPE: lineas/cd-ia/evaluacion-perfil-egreso.md
